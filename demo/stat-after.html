<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stat panel — Show border: ON (after)</title>
<style>
  :root {
    --app-bg: #111217;
    --panel-bg: #181b1f;
    --panel-border: rgba(204, 204, 220, 0.07);
    --text-primary: #ccccdc;
    --text-secondary: rgba(204, 204, 220, 0.65);
    --value-green: #73bf69;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: var(--app-bg);
    font-family: Inter, Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--text-primary);
  }
  .stage {
    min-height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; padding: 40px;
  }
  .caption { color: var(--text-secondary); font-size: 13px; letter-spacing: 0.02em; }
  .caption b { color: var(--text-primary); font-weight: 600; }

  /* Grafana panel chrome */
  .panel {
    width: 460px; height: 240px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 3px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .panel__header {
    height: 34px; flex: 0 0 34px;
    display: flex; align-items: center;
    padding: 0 12px;
    font-size: 13px; font-weight: 500;
    color: var(--text-secondary);
  }
  .panel__body {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 12px;
  }
  /* BigValue content WITH the themed "Show border" enabled */
  .bigvalue {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 14px 28px;
    width: 100%; height: 100%;
    /* the themed border drawn by the Show border option */
    border: 2px solid var(--value-green);
    border-radius: 3px;
  }
  .bigvalue__title { font-size: 15px; color: var(--text-secondary); margin-bottom: 6px; }
  .bigvalue__value {
    font-size: 72px; line-height: 1; font-weight: 600;
    color: var(--value-green);
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="panel">
      <div class="panel__header">Active Users</div>
      <div class="panel__body">
        <div class="bigvalue">
          <div class="bigvalue__title">Active Users</div>
          <div class="bigvalue__value">2,847</div>
        </div>
      </div>
    </div>
    <div class="caption">Stat panel &mdash; <b>Show border: ON</b> (after)</div>
  </div>
</body>
</html>
